[build-system]
requires = ["setuptools", "wheel", "setuptools_scm[toml]"]
build-backend = "setuptools.build_meta"

[project]
name = "fdsreader"
dynamic = ["version"]
description = "Python reader for data generated by FDS."
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
    {name = "FZJ IAS-7 (Jan Vogelsang, Prof. Dr. Lukas Arnold, Tristan Hehnen)", email = "j.vogelsang@fz-juelich.de"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: GNU Lesser General Public License v3 (LGPLv3)",
]
dependencies = [
    "numpy",
    "typing_extensions",
]

[project.urls]
Repository = "https://github.com/FireDynamics/fdsreader"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff",
    "coverage[toml]",
    "pre-commit",
]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme",
    "autodocsumm",
    "nbsphinx",
]

[tool.setuptools_scm]
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "fdsreader",
    "fdsreader.bndf",
    "fdsreader.devc",
    "fdsreader.evac",
    "fdsreader.export",
    "fdsreader.fds_classes",
    "fdsreader.geom",
    "fdsreader.isof",
    "fdsreader.part",
    "fdsreader.pl3d",
    "fdsreader.slcf",
    "fdsreader.smoke3d",
    "fdsreader.utils",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["UP006", "UP007", "UP035"]  # typing generics – schrittweise migrieren

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.coverage.run]
branch = true
source = ["fdsreader"]

[tool.coverage.report]
fail_under = 30
exclude_lines = [
    "if TYPE_CHECKING:",
    "pragma: no cover",
]
